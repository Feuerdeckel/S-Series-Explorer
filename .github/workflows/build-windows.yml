name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e . pyinstaller
      - run: pyinstaller --noconfirm --clean --onefile --windowed --paths src --name S-Series-Explorer launcher.py
      - uses: actions/upload-artifact@v4
        with:
          name: S-Series-Explorer-Windows
          path: dist/S-Series-Explorer.exe
