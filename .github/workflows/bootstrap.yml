name: Bootstrap project source

on:
  push:
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  import-source:
    if: github.event_name != 'issues' || github.event.issue.title == 'IMPORT S-SERIES EXPLORER'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Reconstruct source archive
        shell: bash
        run: |
          cat .bootstrap/archive.part* > source.tar.gz.b64
          base64 --decode source.tar.gz.b64 > source.tar.gz
          tar -xzf source.tar.gz
          rm -f source.tar.gz source.tar.gz.b64
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit complete project tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Import S-Series Explorer MVP"
          git push origin HEAD:main
